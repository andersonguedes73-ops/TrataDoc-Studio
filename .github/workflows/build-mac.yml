name: Build MacOS App

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-mac:
    runs-on: macos-latest

    steps:
    - name: Baixar o código
      uses: actions/checkout@v4

    - name: Configurar Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Instalar Dependências
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller
        pip install -r requirements.txt
        python -m spacy download pt_core_news_md

    - name: Compilar o Aplicativo (PyInstaller)
      run: |
        pyinstaller --noconfirm --onedir --windowed --name "TrataDoc_Studio" --collect-all customtkinter --collect-all pt_core_news_md "TrataDoc_MAC.py"

    - name: Salvar o Aplicativo Gerado
      uses: actions/upload-artifact@v4
      with:
        name: TrataDoc-MacOS
        path: dist/TrataDoc_Studio.app
